<table>
  <thead>
    <tr>
      <th>Title</th>
      <th>Episode ID</th>
    </tr>
  </thead>
  <tbody>
    @for (film of data(); track film.url) {
      <tr>
        <td>
          <a [routerLink]="[film.url | extractId]">{{ film.title }}</a>
        </td>
        <td>{{ film.episode_id }}</td>
      </tr>
    }
  </tbody>
</table>
