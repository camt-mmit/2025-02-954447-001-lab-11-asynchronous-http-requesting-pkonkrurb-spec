<ul class="app-cmp-nav">
      <li>
        <button type="button" (click)="goBack()">
          <i class="material-symbols-outlined">Back</i>

        </button>
      </li>
    </ul>

@if (dataResource.hasValue()) {
  <app-planets-view [data]="dataResource.value()" [moduleRoute]="moduleRoute" />
} @else if (dataResource.error(); as error) {
  <p>{{ error.message }}</p>
} @else if (dataResource.isLoading()) {
  <p>Loading...</p>
}
